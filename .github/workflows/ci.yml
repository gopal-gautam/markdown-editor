name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --frozen-lockfile
        env:
          ELECTRON_DOWNLOAD_TIMEOUT: 60000

      - name: Build application
        run: pnpm make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-linux
          path: out/make

  build-windows:
    needs: lint-and-test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install --frozen-lockfile
        env:
          ELECTRON_DOWNLOAD_TIMEOUT: 60000

      - name: Build application
        run: pnpm make

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-windows
          path: out/make

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.message, ' release:')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: releases-linux
          path: releases-linux

      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: releases-windows
          path: releases-windows

      - name: Prepare release assets
        run: |
          mkdir -p out/release
          find releases-linux -type f -exec cp {} out/release/ \;
          find releases-windows -type f -exec cp {} out/release/ \;

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete existing release and tag if exists
        run: |
          gh release delete v${{ steps.version.outputs.VERSION }} --yes || true
          git push origin :refs/tags/v${{ steps.version.outputs.VERSION }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: out/release/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}